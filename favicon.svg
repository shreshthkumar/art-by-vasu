  <circle cx="32" cy="32" r="14" fill="none" stroke="#4A7C7E" stroke-width="1.5"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="4" fill="#4A7C7E"/>
  <!-- Petal spokes (8 directions) -->
  <line x1="32" y1="2" x2="32" y2="18" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="62" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="32" x2="18" y2="32" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="62" y2="32" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9.4" y1="9.4" x2="20.7" y2="20.7" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43.3" y1="43.3" x2="54.6" y2="54.6" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54.6" y1="9.4" x2="43.3" y2="20.7" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.7" y1="43.3" x2="9.4" y2="54.6" stroke="#4A7C7E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small petal dots on middle ring -->
  <circle cx="32" cy="10" r="2" fill="#C4956A"/>
  <circle cx="32" cy="54" r="2" fill="#C4956A"/>
  <circle cx="10" cy="32" r="2" fill="#C4956A"/>
  <circle cx="54" cy="32" r="2" fill="#C4956A"/>
  <circle cx="47.6" cy="16.4" r="2" fill="#C4956A"/>
  <circle cx="16.4" cy="47.6" r="2" fill="#C4956A"/>
  <circle cx="16.4" cy="16.4" r="2" fill="#C4956A"/>
  <circle cx="47.6" cy="47.6" r="2" fill="#C4956A"/>
